name: Nightly data refresh

on:
  # The FL Lottery regenerates its game/winner data in a once-daily overnight batch, game by game,
  # roughly 1:10-6:20am ET. There is no intraday update and no webhook — verified: ~160M prize
  # counters were byte-identical between an 09:00 and a 15:00 UTC read. So we poll once, AFTER their
  # batch finishes (never during, or we'd bake a half-updated snapshot), plus an afternoon safety net
  # because GitHub silently delays/drops scheduled runs. A same-day rerun no-ops if nothing changed.
  schedule:
    - cron: "7 11 * * *"    # 7:07am ET — ~45min after the Lottery's batch completes (~6:20am ET)
    - cron: "47 15 * * *"   # 11:47am ET safety net
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write            # allow the bot to commit refreshed data.js

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Rebuild data from the Florida Lottery API
        run: python3 pipeline/refresh.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated data
        run: |
          git config user.name  "data-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A public pipeline/pdfcache   # everything the pipeline writes (data, history, stubs, cards, landing pages, sitemap, robots)
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "data: nightly refresh ($(date -u +%Y-%m-%d))"
            git pull --rebase --autostash origin main
            git push
          fi
