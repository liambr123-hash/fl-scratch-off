name: Nightly data refresh

on:
  schedule:
    - cron: "20 9 * * *"   # ~5:20am ET daily (after FL Lottery's nightly file update)
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write            # allow the bot to commit refreshed data.js

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Rebuild data from the Florida Lottery API
        run: python3 pipeline/refresh.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated data
        run: |
          git config user.name  "data-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A public/data.js public/history.json public/g public/og pipeline/pdfcache
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "data: nightly refresh ($(date -u +%Y-%m-%d))"
            git pull --rebase --autostash origin main
            git push
          fi
