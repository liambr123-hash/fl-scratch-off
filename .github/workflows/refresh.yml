name: Nightly data refresh

on:
  # GitHub silently delays or drops scheduled runs under load (worst on/near the hour), so we use an
  # odd minute plus an afternoon safety net: if the morning run is skipped or fails, the second
  # self-heals. A same-day rerun no-ops when the upstream data hasn't changed.
  schedule:
    - cron: "23 9 * * *"    # ~5:23am ET, after the FL Lottery's nightly file update
    - cron: "47 15 * * *"   # ~11:47am ET safety net
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write            # allow the bot to commit refreshed data.js

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r pipeline/requirements.txt

      - name: Rebuild data from the Florida Lottery API
        run: python3 pipeline/refresh.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated data
        run: |
          git config user.name  "data-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A public pipeline/pdfcache   # everything the pipeline writes (data, history, stubs, cards, landing pages, sitemap, robots)
          if git diff --staged --quiet; then
            echo "No data changes today."
          else
            git commit -m "data: nightly refresh ($(date -u +%Y-%m-%d))"
            git pull --rebase --autostash origin main
            git push
          fi
